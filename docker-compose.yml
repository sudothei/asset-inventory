version: '3'
services:
  #api:
    #container_name: api
    #restart: unless-stopped
    #env_file: env_file
    #image: "rust:alpine"
    #working_dir: /app
    #volumes:
      #- ./Cargo.toml:/app/Cargo.toml
    #ports:
      #- "8080:8080"
    #networks:
      #- app_network
    #extra_hosts:
        #- "host.docker.internal:host-gateway"
    #entrypoint: #TODO
  web:
    container_name: web
    env_file: env_file
    image: "node:alpine"
    working_dir: /app/web
    volumes:
      - ./web/package.json:/app/web/package.json
      - ./web/package.lock.json:/app/web/package.lock.json
    networks:
      - app_network
    extra_hosts:
        - "host.docker.internal:host-gateway"
    entrypoint: npm install && npm run build
  nginx:
    container_name: nginx
    restart: unless-stopped
    image: "nginx:alpine"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx:ro
    networks:
      - app_network
    depends_on: 
      - web
      - api
    entrypoint: nginx -g daemon off
networks:
  app_network:
    driver: bridge
volumes:
  app:
